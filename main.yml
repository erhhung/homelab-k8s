---
- name: Set top-level playbook facts
  hosts: localhost
  tasks:
    - name: Set project_dir fact
      ansible.builtin.set_fact:
        # https://docs.ansible.com/ansible/latest/reference_appendices/special_variables.html#term-playbook_dir
        project_dir: "{{ playbook_dir }}"
      when: project_dir is undefined
      # ======= DO NOT REMOVE =======

- name: Include package installs playbook
  ansible.builtin.import_playbook: playbooks/packages.yml
  tags: packages

- name: Include system settings playbook
  ansible.builtin.import_playbook: playbooks/basics.yml
  tags: basics

- name: Include home directory setup playbook
  ansible.builtin.import_playbook: playbooks/files.yml
  tags: files

- name: Include Rancher K3s cluster playbook
  ansible.builtin.import_playbook: playbooks/rancher.yml
  tags: rancher

# NOTE: if initial cluster installation fails, restart
# from rancher.yml playbook to obtain the registration
# manifest URL, or else cluster.yml playbook will just
# spin waiting for Rancher cluster agents to be ready
- name: Include Rancher RKE cluster playbook
  ansible.builtin.import_playbook: playbooks/cluster.yml
  tags: cluster

- name: Include MetalLB load balancer playbook
  ansible.builtin.import_playbook: playbooks/metallb.yml
