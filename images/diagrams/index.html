<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Erhhung's Home Kubernetes Cluster</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: Helvetica, Arial, sans-serif;
      }

      main {
        width: min(100%, 840px);
        margin: 0 auto;
        padding: 28px 14px 44px;
      }

      section {
        margin: 0 0 72px;
        text-align: center;
      }

      section:last-child {
        margin-bottom: 0;
      }

      h1,
      h2 {
        margin: 0 0 28px;
        line-height: 1.05;
        letter-spacing: 0.02em;
      }
      h1 {
        font-size: clamp(1rem, 1.5vw, 2rem);
        font-weight: 750;
        text-align: center;
      }
      h2 {
        font-size: clamp(1.5rem, 1vw, 3rem);
        font-weight: 500;
      }

      img {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Erhhung's Home Kubernetes Cluster</h1>

      <section id="cluster-topology">
        <h2>Cluster Topology</h2>
        <img src="topology.drawio.svg" alt="Cluster Topology diagram" />
      </section>

      <section id="platform-services">
        <h2>Platform Services</h2>
        <img
          src="services.platform.drawio.svg"
          alt="Platform Services diagram"
        />
      </section>

      <section id="ai-services">
        <h2>AI Services</h2>
        <img src="services.ai.drawio.svg" alt="AI Services diagram" />
      </section>
    </main>
  </body>
</html>
