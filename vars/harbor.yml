# harbor_secret:     {vault.yml}
# harbor_db_pass:    {vault.yml}
# harbor_admin_pass: {vault.yml}

harbor_namespace: harbor
harbor_host_name: harbor # alias of "rancher"

# https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_filters.html#products
harbor_fqdn: "{{ [harbor_host_name] | product(search_domains) | map('join','.') | first }}"

harbor_url: https://{{ harbor_container_registry }}
harbor_default_project: library

harbor_secrets:
  ingress: harbor-ingress-tls

# https://goharbor.io/docs/latest/install-config/harbor-ha-helm
# https://github.com/goharbor/harbor-helm/tree/main
harbor_chart_version: "1.19.1"
harbor_release_name: harbor

# https://github.com/goharbor/harbor-helm/tree/main/values.yaml
harbor_chart_values:
  harborAdminPassword: "{{ harbor_admin_pass }}"
  logLevel: info # debug|info|warning|error|fatal

  ipFamily:
    ipv6:
      enabled: false
  externalURL: "{{ harbor_url }}"

  expose:
    # IMPORTANT! if using Traefik (K3s default) as ingress
    # controller, be sure to configure entrypoint settings
    # respondingTimeouts to avoid layer push failures (see
    # templates/k3s/traefik.yaml.j2 and
    # https://github.com/goharbor/harbor/issues/20472)
    type: ingress
    ingress:
      hosts:
        core: "{{ harbor_fqdn }}"
      className: "{{ k3s_ingress_class }}"
    tls:
      certSource: secret
      secret:
        # has keys "tls.crt" & "tls.key"
        secretName: "{{ harbor_secrets['ingress'] }}"

  # secret expected to have key "ca.crt"
  caSecretName: "{{ harbor_secrets['ingress'] }}"

  persistence:
    enabled: true
    resourcePolicy: "" # keep|""=delete

    persistentVolumeClaim:
      # use NFS path on QNAP for high storage
      # components; use local-path for others
      registry:
        storageClass: "{{ storage_classes['nfs'] }}"
        size: 50Gi
      trivy:
        storageClass: "{{ storage_classes['nfs'] }}"
        size: 5Gi

  database:
    type: internal # internal|external
    internal: # standalone PostgreSQL
      password: "{{ harbor_db_pass }}"

      priorityClassName: "{{ priority_classes['database'] }}"

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 50m
      shmSizeLimit: 512Mi

      readinessProbe: &probe
        timeoutSeconds: 5
        failureThreshold: 6
      livenessProbe: *probe

  redis:
    type: internal # internal|external
    internal:
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 25m

      readinessProbe: *probe
      livenessProbe: *probe

  # cache `project/project_metadata/repository/artifact/manifest`
  # in Redis to improve the performance of concurrent image pulls
  cache:
    enabled: true
    expireHours: 12

  # main app & REST API: authN/authZ, users,
  # projects, quotas, policies, tokens, etc.
  core:
    replicas: 1
    revisionHistoryLimit: "{{ k8s_max_revisions }}"

    secret: "{{ harbor_secret }}"
    # xsrfKey must be exactly 32 chars
    xsrfKey: "{{ harbor_secret * 2 }}"
    # provide self-signed CA cert for token signing
    # so that Helm template won't generate new cert
    # each time, but need to update it when expired:
    # openssl genrsa -out ca.key -traditional 2048
    # openssl req -x509 -key ca.key -out ca.crt -sha256 -days 3650 \
    #   -subj /CN=harbor-token-ca -extensions v3_ca -config - <<EOF
    # [v3_ca]
    # keyUsage=critical,digitalSignature,keyEncipherment,keyCertSign
    # extendedKeyUsage=serverAuth,clientAuth
    # basicConstraints=critical,CA:true
    # subjectKeyIdentifier=hash
    # EOF
    # ansible-vault encrypt ca.key
    # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/file_lookup.html
    tokenCert: "{{ lookup('ansible.builtin.file', files_dir ~ '/harbor/ca.crt', rstrip=false) }}"
    # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/unvault_lookup.html
    tokenKey: "{{ lookup('ansible.builtin.unvault', files_dir ~ '/harbor/ca.key') }}"

    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 50m

    readinessProbe: *probe
    livenessProbe: *probe

  # web UI frontend
  portal:
    replicas: 1
    revisionHistoryLimit: "{{ k8s_max_revisions }}"

    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 10m

    readinessProbe: *probe
    livenessProbe: *probe

  # OCI registry backend
  registry:
    replicas: 1
    revisionHistoryLimit: "{{ k8s_max_revisions }}"

    secret: "{{ harbor_secret }}"

    credentials:
      username: "{{ harbor_admin_user }}"
      password: "{{ harbor_admin_pass }}"
      # username and password values will be ignored because
      # we set htpasswdString to a fixed string so that Helm
      # template won't generate a new string each time using
      # htpasswd function, which uses a random salt:
      # htpasswd -nbBC 10 $HARBOR_USER $HARBOR_PASS | \
      #                tr -d '\n' | sed 's/$2y/$2a/'
      htpasswdString: >-
        {{ harbor_admin_user }}:{{ harbor_admin_pass |
           ansible.builtin.password_hash('bcrypt', salt=bcrypt_salt, rounds=bcrypt_rounds) }}

    registry:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m

      readinessProbe: *probe
      livenessProbe: *probe

    controller:
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 25m

      readinessProbe: *probe
      livenessProbe: *probe

  # runs background and scheduled jobs like replication, GC,
  # webhooks, vulnerability scanning, artifact purging tasks
  jobservice:
    replicas: 1
    revisionHistoryLimit: "{{ k8s_max_revisions }}"

    secret: "{{ harbor_secret }}"

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 25m

    readinessProbe: *probe
    livenessProbe: *probe

  # Trivy vulnerability scanner
  trivy:
    enabled: true
    replicas: 1

    vulnType: os,library # os|library
    # CSV list of severities to check
    severity: LOW,MEDIUM,HIGH,CRITICAL
    # GitHub PAT for downloading Trivy
    # DB without anonymous rate limits
    gitHubToken: "{{ github_access_token }}"
    # give ample time to scan large images
    # on a very resource-constrained node
    timeout: 30m

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 1Gi

    readinessProbe: *probe
    livenessProbe: *probe

  metrics:
    enabled: true

  # Prometheus metrics exporter
  exporter:
    replicas: 1
    revisionHistoryLimit: "{{ k8s_max_revisions }}"

    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 10m

    readinessProbe: *probe
    livenessProbe: *probe
