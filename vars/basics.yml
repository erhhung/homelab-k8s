# adjust Linux kernel parameters:
# https://www.enginyring.com/en/blog/a-guide-to-tuning-kernel-parameters-with-sysctl-in-linux
# run "sysctl -a" to see current values
sysctl:
  - key: fs.file-max
    value: 2097152
  # bump inotify limits to prevent error:
  # "watcher create: too many open files"
  - key: fs.inotify.max_user_instances
    value: 2048 # default=128
  - key: fs.inotify.max_user_watches
    value: 1048576 # default=171090
  - key: fs.inotify.max_queued_events
    value: 65536 # default=16384
  - key: vm.max_map_count
    value: 262144 # default=65530
  - key: net.core.somaxconn
    value: 16384 # default=128

# adjust process resource limits:
# https://www.man7.org/linux/man-pages/man5/limits.conf.5.html
# https://docs.ansible.com/ansible/latest/collections/community/general/pam_limits_module.html
# run "ulimit -a" to see limits; run "sysctl fs.file-nr"
# to see current usage (output values are used/free/max)
pam_limits:
  nofile:
    type: "-"
    domain: "*"
    value: 1048576

# add /etc/apparmor.d/local/<profile>
# files to override AppArmor profiles
apparmor_overrides:
  # when AppArmor profile `buildah` is applied to container running sshd, SSH
  # login fails due to PAM (pam_unix.so) failing to run /usr/sbin/unix_chkpwd
  # because `unix-chkpwd` profile denies CAP_DAC_OVERRIDE:
  # sudo journalctl -k --since "10 minutes ago" | grep -E 'apparmor="DENIED"'
  # apparmor="DENIED" operation="capable" class="cap" profile="unix-chkpwd"
  #      pid=2235742 comm="unix_chkpwd" capability=1 capname="dac_override"
  # workaround is to add `dac_override` capability:
  # https://github.com/roddhjav/apparmor.d/issues/958
  # https://github.com/moby/moby/issues/48734
  - profile: unix-chkpwd
    content: capability dac_override,

# only necessary if hosts are not rebooted after
# drivers get installed by packages.yml playbook
# run "lsmod | grep <driver>" to check if driver
# is loaded
modprobe:
  - i915

host_pif: enX0 # XCP-ng VM physical interface
subnet_mask: /24
name_servers:
  - 192.168.0.1 # first IP address is used as default gateway
  - 9.9.9.9 # https://quad9.net/ (Swiss non-profit foundation)
  - 1.1.1.1 # https://developers.cloudflare.com/1.1.1.1/ip-addresses

add_user_to_groups:
  - user: "{{ ansible_user }}"
    groups:
      - render # access /dev/dri/ by clinfo
    # GPU passthrough enabled hosts (should
    # match gpu_passthrough_vms defined in
    # vars/vms.yml in homelab-xcp project)
    hosts:
      - k8s3
      - k8s4
      - k8s5
      - k8s6

# <name>,[user|group],[runas],
# [setenv:bool],[commands=ALL]
sudoers_rules:
  - name: sudo-env-keep
    group: sudo
    setenv: true
