---
# buildkite_access_token: {vault.yml}
# buildkite_agent_token:  {vault.yml}
# buildkite_cluster_id:   {vault.yml}

buildkite_namespace: buildkite

buildkite_org_slug: erhhung
buildkite_api_base: https://api.buildkite.com/v2
buildkite_api_url: "{{ buildkite_api_base }}/organizations/{{ buildkite_org_slug }}"

buildkite_secrets:
  ca-certs: buildkite-ca-certs
  # contains ~/.ssh/* files like
  # *.pem, config and known_hosts
  ssh-creds: buildkite-git-ssh-creds
  # contains .git-credentials file
  git-creds: buildkite-git-http-creds
  # contains env vars like CI_REGISTRY
  env-vars: buildkite-command-env

buildkite_configmaps:
  # templates/buildkite/extras.yaml.j2
  scripts: buildkite-command-scripts

buildkite_harbor_user: buildkite
buildkite_harbor_pass: "{{ harbor_admin_pass }}"

# https://buildkite.com/docs/agent/v3/agent-stack-k8s/installation
buildkite_chart_oci_url: oci://ghcr.io/buildkite/helm/agent-stack-k8s
# https://github.com/buildkite/agent-stack-k8s
buildkite_chart_version: "0.42.0"
buildkite_release_name: agent-stack-k8s

# https://github.com/buildkite/agent-stack-k8s/tree/main/charts/agent-stack-k8s/values.yaml
buildkite_chart_values:
  agentToken: "{{ buildkite_agent_token }}"

  config:
    tags:
      # self-hosted queue
      - queue=kubernetes

    # https://buildkite.com/docs/agent/v3/agent-stack-k8s/controller-configuration#flags
    # default 1s poll interval is
    # too aggressive for our usage
    poll-interval: 10s
    max-in-flight: 1 # max concurrent jobs
    job-active-deadline-seconds: 7200 # 2h
    job-ttl: 10m # ttlSecondsAfterFinished

    # https://buildkite.com/docs/agent/self-hosted/agent-stack-k8s/agent-configuration
    agent-config:
      # shell command that runs build commands:
      # https://buildkite.com/docs/agent/self-hosted/configure
      shell: /bin/bash -ec

    # https://buildkite.com/docs/agent/v3/agent-stack-k8s/git-credentials#cloning-repositories-using-ssh-keys
    pod-spec-patch:
      # schedule on the node that has the
      # most memory and ephemeral storage
      affinity:
        nodeAffinity:
          # preferredDuringSchedulingIgnoredDuringExecution:
          #   - weight: 100
          #     preference:
          #       matchExpressions:
          #         - key: node-role.kubernetes.io/runner
          #           operator: Exists
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # label defined in vars/kubernetes.yml
                  - key: node-role.kubernetes.io/runner
                    operator: Exists

      # service account with cluster admin access is
      # defined in templates/buildkite/extras.yaml.j2
      serviceAccountName: "{{ buildkite_release_name }}-runner"

      initContainers:
        # create ca-bundle.crt file
        # with our private CA certs
        - name: ca-bundle
          image: ghcr.io/buildkite/agent
          imagePullPolicy: IfNotPresent
          command: ["sh"]
          args:
            - -c
            - |-
              update-ca-certificates || exit
              # copy updated CA bundle containing extra certs
              # from /usr/local/share/ca-certificates and all
              # already in trust store under /etc/ssl/certs.
              # the new ca-certificates.crt will be mounted
              # into main container to replace existing one.
              CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
              cp $CA_BUNDLE /certs/ca-bundle.crt
              echo; tail -n 23 $CA_BUNDLE

          volumeMounts:
            - name: ca-certs
              mountPath: /usr/local/share/ca-certificates
              readOnly: true
            - name: ca-bundle
              mountPath: /certs

        # fix permissions on ~/.ssh/* files,
        # such as *.pem, config, known_hosts
        - name: ssh-config
          image: docker.io/busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command: ["sh"]
          args:
            - -c
            - |-
              cp /ssh/src/* /ssh/dest
              chmod 755     /ssh/dest
              chmod 644     /ssh/dest/*
              chmod 400     /ssh/dest/*.pem
              ls    -al     /ssh/dest

          volumeMounts:
            - name: ssh-creds
              mountPath: /ssh/src
              readOnly: true
            - name: ssh-config
              mountPath: /ssh/dest

      containers:
        - name: container-0
          # https://buildkite.com/docs/agent/self-hosted/agent-stack-k8s/custom-images#specifying-custom-images-using-controller-configuration
          # https://github.com/erhhung/al2023-devops
          image: "{{ harbor_container_registry }}/library/al2023-devops:latest"
          imagePullPolicy: Always

          # allow building OCI images using Buildah
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            appArmorProfile:
              type: Localhost
              localhostProfile: buildah

          # use same resource requests as
          # GitLab runner build container
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              ephemeral-storage: 40Gi

      volumes:
        - name: ca-certs
          secret:
            secretName: "{{ buildkite_secrets['ca-certs'] }}"
            defaultMode: 420 # "0644"
        - name: ca-bundle
          emptyDir: {}
        - name: ssh-config
          emptyDir: {}
        - name: ssh-creds
          secret:
            secretName: "{{ buildkite_secrets['ssh-creds'] }}"
            defaultMode: 256 # "0400"
        - name: git-creds
          secret:
            secretName: "{{ buildkite_secrets['git-creds'] }}"
            defaultMode: 384 # "0600"
        - name: scripts
          configMap:
            name: "{{ buildkite_configmaps['scripts'] }}"
            defaultMode: 493 # "0755"

    # https://buildkite.com/docs/agent/self-hosted/agent-stack-k8s/default-parameters#default-checkout-parameters
    default-checkout-params:
      # https://buildkite.com/docs/agent/v3/agent-stack-k8s/volume-mounts#checkout-containers-only
      extraVolumeMounts: "{{ buildkite_volume_mounts }}"

    # https://buildkite.com/docs/agent/self-hosted/agent-stack-k8s/default-parameters#default-command-parameters
    default-command-params:
      envFrom:
        - secretRef:
            name: "{{ buildkite_secrets['env-vars'] }}"
      # https://buildkite.com/docs/agent/v3/agent-stack-k8s/volume-mounts#command-containers-only
      extraVolumeMounts: |
        {{ buildkite_volume_mounts + [{
             'name':      'scripts',
             'mountPath': '/ci/scripts',
             'readOnly':   true,
           }] }}

  monitoring:
    podMonitor:
      deploy: true
    deployGrafanaDashboard: true

buildkite_volume_mounts:
  - name: ca-bundle # Debian/Ubuntu/Alpine
    mountPath: /etc/ssl/certs/ca-certificates.crt
    subPath: ca-bundle.crt
  - name: ca-bundle # Fedora/CentOS/RHEL
    mountPath: /etc/pki/tls/certs/ca-bundle.crt
    subPath: ca-bundle.crt
  - name: ssh-config
    mountPath: /root/.ssh
  - name: git-creds
    mountPath: /root/.git-credentials
    subPath: .git-credentials

buildkite_pipelines:
  - name: Argo CD
    slug: argo-cd
    repo_url: git@github.com:erhhung/argo-cd.git
    default_branch: buildkite-ci
  - name: Flowise
    slug: flowise
    repo_url: git@github.com:erhhung/flowise.git
    default_branch: buildkite-ci
  - name: Crawl4AI
    slug: crawl4ai
    repo_url: git@github.com:erhhung/mcp-crawl4ai.git
    default_branch: buildkite-ci
