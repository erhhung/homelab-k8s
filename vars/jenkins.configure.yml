# jenkins_slack_token: {vault.yml}

# https://github.com/jenkinsci/configuration-as-code-plugin/tree/master/demos/embedded-userdatabase
jenkins_users:
  - name: Jenkins Admin
    id: ${chart-admin-username}
    password: ${chart-admin-password}
    properties:
      - mailer:
          emailAddress: "{{ homelab_admin.email }}"
      - timezone: &timezone
          timeZoneName: "{{ system_time_zone }}"

  - name: "{{ user_erhhung.fullname }}"
    id: "{{   user_erhhung.username }}"
    password: ${chart-admin-password}
    properties:
      - mailer:
          emailAddress: "{{ user_erhhung.email }}"
      - timezone: *timezone

