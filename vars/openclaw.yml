# openclaw_gateway_token:     {vault.yml}
# openclaw_channel_secrets.*: {vault.yml}
# gogcli_keyring_pass:        {vault.yml}

openclaw_namespace: openclaw
openclaw_host_names: # aliases of "ingress"
  - openclaw
  - agents

# remember to add openclaw.fourteeners.local & agents.fourteeners.local
# to pfSense DNS as aliases of ingress.fourteeners.local: 192.168.4.222
# https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_filters.html#products
openclaw_fqdns: "{{ openclaw_host_names | product(search_domains) | map('join','.') }}"

openclaw_secrets:
  ingress: openclaw-ingress-tls
  env-vars: openclaw-env-variables
  skills: openclaw-skills-config

openclaw_data_dir: /home/node/.openclaw

# container env vars that app-template renders into `env[]` list.
# Note the use of alternate form with `dependsOn` so that $(VAR)
# expansions are evaluated in the proper order due to otherwise
# alphabetical ordering of dictionary keys
openclaw_common_env:
  TZ: "{{ system_time_zone }}"
  OPENCLAW_HOME: "{{ openclaw_data_dir }}"
  XDG_CONFIG_HOME: $(OPENCLAW_HOME)/config
  XDG_CACHE_HOME: $(OPENCLAW_HOME)/cache
  OPENCLAW_CONFIG_PATH:
    value: $(OPENCLAW_HOME)/openclaw.json
    dependsOn: OPENCLAW_HOME
  OPENCLAW_STATE_DIR: $(OPENCLAW_HOME)/.openclaw
  OPENCLAW_PLUGIN_DIR:
    value: $(OPENCLAW_STATE_DIR)/extensions
    dependsOn: OPENCLAW_STATE_DIR
  NODE_OPTIONS: --max-old-space-size=4096
  NPM_CONFIG_CACHE:
    value: $(OPENCLAW_HOME)/npm/cache
    dependsOn: OPENCLAW_HOME
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  PNPM_HOME: $(OPENCLAW_HOME)/pnpm
  PNPM_STORE_DIR: $(PNPM_HOME)/store
  PATH:
    value: $(OPENCLAW_HOME)/bin:$(PNPM_HOME):/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin
    dependsOn:
      - OPENCLAW_HOME
      - PNPM_HOME

# https://github.com/serhanekicii/openclaw-helm/tree/main/charts/openclaw
openclaw_chart_repo_url: https://serhanekicii.github.io/openclaw-helm
openclaw_chart_version: "1.5.10"
openclaw_release_name: openclaw

# comment out `openclaw_app_version` below
# to let playbook get chart's `appVersion`
# https://github.com/openclaw/openclaw/pkgs/container/openclaw/versions?filters%5Bversion_type%5D=tagged
openclaw_app_version: "2026.4.2"

# https://github.com/serhanekicii/openclaw-helm/tree/main/charts/openclaw/values.yaml
openclaw_chart_values:
  # https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
  # https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common/values.yaml
  app-template:
    openclawVersion: "{{ openclaw_app_version }}"

    # `merge` preserves runtime changes
    # use `overwrite` for strict GitOps
    configMode: overwrite # merge|overwrite
    configMaps:
      config:
        data:
          # match gateway-generated config format so that it
          # doesn't complain and rewrite the file on startup
          openclaw.json: |-
            {# https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_templating_now.html -#}
            {{ openclaw_config | ansible.builtin.combine({
                 'meta': {
                   'lastTouchedVersion': openclaw_app_version,
                   'lastTouchedAt': now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ'),
                 },
               }) | ansible.builtin.to_nice_json(indent=2) }}

          # ~/.bash_aliases for admin
          # interactive shell session
          bash_aliases: |
            cd $OPENCLAW_HOME

            # set color prompt
            PS1="\[\033[1;36m\]\$(id -un 2> /dev/null)\[\033[1;31m\]@\[\033[1;32m\]\h:\[\033[1;35m\]\w\[\033[1;31m\]\$\[\033[0m\] "
            export LESS='-RFKLMi -x4 -z-4'

            lj() { # less on JSON
              __lj() { jq -C . | less; }
              (($#)) && { cat "$@" | __lj; } || __lj
            }
            ly() { # less on YAML
              __ly() { yq -C . | less; }
              (($#)) && { cat "$@" | __ly; } || __ly
            }
            alias openclaw='node /app/dist/index.js'
            alias cdd='cd $OLDPWD'
            alias  ls='ls --color=auto '
            alias  ll='ls -alF '
            alias  lt='ll -tr '
            alias   l='less'

    controllers:
      main:
        # must be 1: OpenClaw doesn't
        # support horizontal scaling!
        replicas: 1

        initContainers:
          ca-bundle:
            image: &openclaw-image
              repository: ghcr.io/openclaw/openclaw
              tag: "{% raw %}{{ .Values.openclawVersion }}{% endraw %}"
            securityContext:
              runAsUser: 0
            command: ["bash"]
            args:
              - -c
              - |-
                mkdir  -p  {{ openclaw_data_dir }}/{.openclaw,certs,bin,config}
                chmod 700  {{ openclaw_data_dir }}/{.openclaw,.}
                CERTS_DIR="{{ openclaw_data_dir }}/certs"
                  BIN_DIR="{{ openclaw_data_dir }}/bin"

                # ca.crt is already mounted
                CA_CERT="/usr/local/share/ca-certificates/ca.crt"
                CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
                NSSDB_DIR="$CERTS_DIR/nssdb"

                log() {
                  if [ "$1" == -n ]; then echo; shift; fi
                  echo "[$(date +"%Y-%m-%d %H:%M:%S")] $*"
                }
                packages=()
                [ -f $NSSDB_DIR/cert9.db ] || packages+=(libnss3-tools)
                [ -f   $BIN_DIR/less     ] || packages+=(less)

                if [ "$packages" ]; then
                  log "Installing packages: ${packages[*]}"
                  apt-get update && apt-get install -y "${packages[@]}"
                  [ -f $BIN_DIR/less ] || cp -a $(which less) $BIN_DIR
                fi

                if [ -f $CERTS_DIR/ca-bundle.crt ]; then
                  log -n "CA bundle already exists"
                else
                  log -n "Updating trust store..."
                  # ignore "rehash: warning:" output
                  update-ca-certificates 2> /dev/null && {
                    cp $CA_BUNDLE $CERTS_DIR/ca-bundle.crt
                    echo; tail -n 11 $CA_BUNDLE
                  }
                fi

                if [ -f $NSSDB_DIR/cert9.db ]; then
                  log -n "NSS database already exists"
                else
                  log -n "Creating NSS database..."
                  mkdir -p $NSSDB_DIR

                  # use certificate's CN as nickname
                  nickname="$(openssl x509 -in $CA_CERT -noout -subject -nameopt RFC2253 | \
                                sed -n 's/^subject=.*CN=\([^,]*\)\(,.*\)\?$/\1/p')"
                  # https://www.linux.org/docs/man1/certutil.html
                  certutil -d sql:$NSSDB_DIR -N --empty-password
                  certutil -d sql:$NSSDB_DIR -A -t "C,," -n "$nickname" -i $CA_CERT
                  certutil -d sql:$NSSDB_DIR -L
                fi

                find {{ openclaw_data_dir }} -maxdepth 2 -exec chown node:node {} \;
                log -n "Trust store setup completed ✓"

          init-config:
            image: *openclaw-image
            env: "{{ openclaw_common_env }}"
            command: ["bash"]
            args:
              - -c
              - |-
                set -eo pipefail

                BIN_DIR="$OPENCLAW_HOME/bin"
                ARCH="$(uname -m | sed -e 's/aarch64/arm64/' \
                                       -e  's/x86_64/amd64/')"
                log() {
                  if [ "$1" == -n ]; then echo; shift; fi
                  echo "[$(date +"%Y-%m-%d %H:%M:%S")] $*"
                }
                install_bin() (
                  bin=$1 src=$2
                  cd $BIN_DIR

                  [ -f "$bin" ] || {
                    log  "Installing $bin..."
                    curl -fsSLo $bin $src
                    chmod    +x $bin
                  }
                  ( set -x; $bin --version )
                )
                install_bin jq "https://github.com/stedolan/jq/releases/latest/download/jq-linux-$ARCH"
                install_bin yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_$ARCH"

                 TMP_CONFIG="/tmp/openclaw.json"
                 SRC_CONFIG="/conf/openclaw.json"
                DEST_CONFIG="$OPENCLAW_CONFIG_PATH"
                CONFIG_MODE="${CONFIG_MODE:-merge}"

                if [[ $CONFIG_MODE == merge && -f $DEST_CONFIG ]]; then
                  log -n "Merging Helm config into existing config..."
                  jq -s '.[0] * .[1]' $DEST_CONFIG $SRC_CONFIG > $TMP_CONFIG
                  mv -f   $TMP_CONFIG $DEST_CONFIG
                else
                  log -n "Using Helm config as the official config..."
                  jq  . $SRC_CONFIG > $DEST_CONFIG
                fi

                if [ $(ls -1 $OPENCLAW_CONFIG_PATH* | wc -l) -gt 1 ]; then
                  log "Deleting backup/clobbered config files..."
                  rm -f $OPENCLAW_HOME/*.{bak,clobbered}*
                fi
                ( set -x; jq . $OPENCLAW_CONFIG_PATH )

                LOG_FILE="/tmp/openclaw.log"
                MAX_LINES=1000

                if [[ -f $LOG_FILE && $(wc -l $LOG_FILE) -gt $MAX_LINES ]]; then
                  log  -n "Trimming log file..."
                  tail -n $MAX_LINES $LOG_FILE > $LOG_FILE~ && \
                               mv -f $LOG_FILE~  $LOG_FILE
                  ls  -lh $LOG_FILE
                fi
                log -n "Configuration update completed ✓"

          # https://docs.openclaw.ai/tools/plugin
          init-plugins:
            image: *openclaw-image
            envFrom: &env-from
              - secretRef:
                  name: "{{ openclaw_secrets['env-vars'] }}"
            env: "{{ openclaw_common_env }}"
            command: ["bash"]
            args:
              - -c
              - |-
                set -eo pipefail

                BIN_DIR="$OPENCLAW_HOME/bin"

                log() {
                  if [ "$1" == -n ]; then echo; shift; fi
                  echo "[$(date +"%Y-%m-%d %H:%M:%S")] $*"
                }
                plugin_install() (
                  id=$1 pkg=$2 ver=$3

                  pkg_dir="$OPENCLAW_PLUGIN_DIR/$id"
                  if [ -d "$pkg_dir" ]; then
                    old_ver=$(jq -r .version "$pkg_dir/package.json")
                    if [ "$old_ver" == "$ver" ]; then
                      log "Plugin is already installed"
                      exit
                    fi
                    rm -rf "$pkg_dir"
                  fi

                  mkdir -p $pkg_dir
                  cd       $pkg_dir
                  tarball=$(pnpm view $pkg@$ver dist.tarball)
                  log "Unpacking: $tarball"

                  curl -fsSL $tarball | \
                    tar -xz --no-same-owner --strip-components=1
                  pnpm install --prod
                )

                [ -f "$BIN_DIR/uv" ] || {
                  log -n "Installing uv..."
                  # https://docs.astral.sh/uv/getting-started/installation
                  curl -sfL https://astral.sh/uv/install.sh | UV_INSTALL_DIR=$BIN_DIR sh
                }
                [ -f "$PNPM_HOME/pnpm" ] || {
                  log -n "Installing pnpm..."
                  # https://pnpm.io/installation#in-a-docker-container
                  curl -fsL https://get.pnpm.io/install.sh | ENV=/dev/null SHELL=/bin/sh sh
                }
                {% for plugin in openclaw_plugins %}

                log -n "Installing plugin: {{ plugin.id }}"
                {%   if plugin.setup is defined %}
                log "Performing plugin setup..."
                (
                {{ plugin.setup }}
                )
                {%   endif %}
                plugin_install {{ plugin.id }} \
                  {{ plugin.package }} {{ plugin.version }}
                {% endfor %}

                log -n "Plugins initialization completed ✓"

          # install ClawHub (https://clawhub.com)
          # skills and their runtime dependencies
          init-skills:
            image: *openclaw-image
            env: "{{ openclaw_common_env }}"
            envFrom: *env-from
            command: ["bash"]
            args:
              - -c
              - |-
                set -eo pipefail

                CONFIG_DIR="/conf/skills"
                BIN_DIR="$OPENCLAW_HOME/bin"
                ARCH="$(uname -m | sed -e 's/aarch64/arm64/' \
                                       -e  's/x86_64/amd64/')"
                WORKSPACE_DIR="$OPENCLAW_HOME/workspace"
                SKILL_DIR="$WORKSPACE_DIR/skills"
                mkdir -p $SKILL_DIR

                log() {
                  if [ "$1" == -n ]; then echo; shift; fi
                  echo "[$(date +"%Y-%m-%d %H:%M:%S")] $*"
                }
                clawhub_install() (
                  slug=$1 name=$(basename "$1")
                  if [ -d "$SKILL_DIR/$name" ]; then
                    log "Skill is already installed"
                    exit
                  fi

                  cd $WORKSPACE_DIR
                  ATTEMPTS=6 delay=5

                  for i in $(seq 1 $ATTEMPTS); do
                    log "Running clawhub install..."

                    # --force is necessary to install a skill flagged as
                    # suspicious by ClawHub, but all skills selected for
                    # installation here should have already been vetted!

                    if npx -y clawhub --no-input install "$slug" --force; then
                      log "Skill installed successfully."
                      exit
                    elif [ $i -lt $ATTEMPTS ]; then
                      jitter=$((RANDOM % 5))
                      log "Install failed! (attempt $i of $ATTEMPTS)"
                      log "Trying again in $((delay + jitter)) seconds..."
                      sleep $((delay + jitter))
                      ((delay *= 2))
                    fi
                  done
                  log "Install failed after $ATTEMPTS attempts!"
                  exit 1
                )
                {% for skill in openclaw_skills %}

                log -n "Installing skill: {{ skill.slug }}"
                {%   if skill.setup is defined %}
                log "Performing skill setup..."
                (
                {{ skill.setup }}
                )
                {%   endif %}
                clawhub_install {{ skill.slug }}
                {% endfor %}

                log -n "Skills initialization completed ✓"

        containers:
          main: # gateway container
            envFrom: *env-from
            env: |
              {% set env = openclaw_common_env | combine({
                   'NODE_EXTRA_CA_CERTS': '/tls/otlp/ca.crt',
                 }) %}
              {% for extra in openclaw_plugins +
                              openclaw_skills  %}
              {%   if extra.env is defined     %}
              {%     set _ = env.update(extra.env) %}
              {%   endif %}
              {% endfor  %}
              {{ env     }}

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 4Gi

          # NOTE: browser sidecar only has /tmp as writable
          # emptyDir, so session persistence isn't possible
          chromium:
            env:
              TZ: "{{ system_time_zone }}"
              NSS_DEFAULT_DB_DIR: /usr/local/share/pki/nssdb

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 2Gi

    persistence:
      ca-certs:
        enabled: true
        # https://bjw-s-labs.github.io/helm-charts/docs/common-library/storage/types/secret
        type: secret
        name: "{{ openclaw_secrets['ingress'] }}"
        defaultMode: 420 # "0644"
        advancedMounts:
          main:
            ca-bundle:
              - path: /usr/local/share/ca-certificates/ca.crt
                subPath: ca.crt
                readOnly: true
            main:
              - path: /tls/otlp/ca.crt
                subPath: ca.crt
                readOnly: true

      config:
        # https://bjw-s-labs.github.io/helm-charts/docs/common-library/storage/types/configmap
        type: configMap
        identifier: config
        advancedMounts:
          main:
            init-config:
              - path: /conf

      # PVC for /home/node/.openclaw
      data:
        # https://bjw-s-labs.github.io/helm-charts/docs/common-library/storage/types/nfs-share
        type: nfs
        server: "{{ homelab_nfs.server }}"
        path: "{{ homelab_nfs.base_path }}/openclaw"
        advancedMounts:
          main:
            ca-bundle: &data-dir
              - path: "{{ openclaw_data_dir }}"
            init-config: *data-dir
            init-plugins: *data-dir
            init-skills: *data-dir
            main:
              - path: "{{ openclaw_data_dir }}"
              - path: /etc/ssl/certs/ca-certificates.crt
                subPath: certs/ca-bundle.crt
                readOnly: true
            chromium:
              - path: /etc/ssl/certs/ca-certificates.crt
                subPath: certs/ca-bundle.crt
                readOnly: true
              # container has no $HOME, and WORKDIR is /
              - path: /usr/local/share/pki/nssdb
                subPath: certs/nssdb

      skill-configs:
        enabled: true
        type: secret
        name: "{{ openclaw_secrets['skills'] }}"
        defaultMode: 420 # "0644"
        advancedMounts:
          main:
            init-skills:
              - path: /conf/skills

    ingress:
      main:
        enabled: true
        tls:
          - secretName: "{{ openclaw_secrets['ingress'] }}"
            hosts: "{{ openclaw_fqdns }}"
        className: "{{ rke_ingress_class }}"
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/backend-protocol: HTTP

          # https://websocket.org/guides/infrastructure/kubernetes#quick-start-nginx-ingress
          # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations#custom-timeouts
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

          # allow uploading large files and prevent 413 (Entity
          # Too Large) errors; set to "0" to disable size limit:
          # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations#custom-max-body-size
          nginx.ingress.kubernetes.io/proxy-body-size: 10m
        hosts: |
          {% set hosts = [] %}
          {% for fqdn in openclaw_fqdns %}
          {%   set _ = hosts.append({
                 'host':  fqdn,
                 'paths': [{
                   'path':     '/',
                   'pathType': 'Prefix',
                   'service':  {
                     'identifier': 'main',
                     'port':       'http',
                   },
                 }],
               })   %}
          {% endfor %}
          {{ hosts  }}

# ====================================== Plugins & Skills ===================================

# {id,[setup],package,version,[env]}
openclaw_plugins:
  # https://github.com/Martian-Engineering/lossless-claw
  - id: lossless-claw
    package: "@martian-engineering/lossless-claw"
    version: "0.5.2"

  # https://github.com/erhhung/openclaw-searxng-search
  - id: searxng-search
    package: "@erhhung/searxng-search"
    version: "1.0.1"

# https://clawhub.ai/skills
# {slug,[setup],[env]}
openclaw_skills:
  # https://clawhub.ai/steipete/gog
  - slug: gog
    setup: |-
      REL="https://github.com/steipete/gogcli/releases"
      VER=$(curl -Is "$REL/latest" | sed -En 's/^location:.+\/tag\/v(.+)\r$/\1/p')

      # $BIN_DIR, $CONFIG_DIR, and $ARCH
      # are already defined by container
      cd $BIN_DIR

      # check if latest version already installed
      [ -f gog ] && {
        ver=$(v=(`./gog version`); echo ${v[0]})
        [ "$ver" == "$VER" ] && {
          log "gogcli is already installed"
          exit
        }
      }
      curl -fsSL "$REL/download/v${VER}/gogcli_${VER}_linux_${ARCH}.tar.gz" | \
        tar -xz --no-same-owner gog
      ( set -x; gog version )

      cd $XDG_CONFIG_HOME
      [ -d gogcli ] || {
        # copy credential files in Secret
        tar -xzf "$CONFIG_DIR/gog.tar.gz"
        ( set -x; find gogcli/ )
      }
    # https://github.com/steipete/gogcli#environment-variables
    env:
      GOG_TIMEZONE:
        value: $(TZ)
        dependsOn: TZ
      GOG_JSON: "true"
      GOG_ACCOUNT: "{{ user_erhhung.email }}"
      # GOG_KEYRING_PASSWORD stored in Secret

  # https://clawhub.ai/conorkenn/openclaw-github-assistant
  - slug: openclaw-github-assistant
    # `github.username` & `github.token`
    # have been added to "openclaw.json"

  # https://clawhub.ai/steipete/video-frames
  - slug: video-frames
    setup: |-
      cd $BIN_DIR

      # there's new FFmpeg build every day,
      # so don't bother upgrading to latest
      [ -f ffmpeg ] && {
        log "ffmpeg is already installed"
        exit
      }

      REL="https://github.com/BtbN/FFmpeg-Builds/releases"
      ARCH="$(uname -m | sed -e 's/aarch64/arm64/' \
                             -e     's/x86_64/64/')"
      BUILD="ffmpeg-master-latest-linux${ARCH}-gpl"

      curl -fsSL "$REL/download/latest/$BUILD.tar.xz" | \
        tar -xJ --no-same-owner --strip-components=2 $BUILD/bin/{ffmpeg,ffprobe}
      ( set -x; ffmpeg -version )
