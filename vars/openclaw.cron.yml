# https://docs.openclaw.ai/automation/cron-jobs
# https://docs.openclaw.ai/automation/cron-jobs#cli-examples
openclaw_cron_jobs:
  # each key (in snake_case) will become --key arg (in kebab-case)
  # for either `openclaw cron add` or `openclaw cron edit` command
  - name: GitHub activities
    # description: optional
    cron: 0 8 * * *
    # tz: $TZ default
    # session=isolated requires `message`;
    # session=main requires `system_event`
    session: isolated
    message: >-
      Check Gmail for GitHub notifications from the past 24 hours.
      Create a report with one-line summaries for each email, and
      include links to the corresponding issues or PRs if available.
      All gog CLI commands must be executed using the exec tool with
      host="gateway", and the entire command must begin with `gog`--
      don't prefix the command with environment variable assignments.
      Use the following paths and commands to get you started:
      - Workspace skills: `/home/node/.openclaw/workspace/skills`
      - Get gog skill description: `cat /app/skills/gog/SKILL.md`
      - Get Gmail messages: `gog gmail messages search 'from:github.com newer_than:1d' --all --include-body --json --results-only`
    # if announce=true Ansible task will additionally append
    # `--channel` and `--to` to send the report via Slack DM
    announce: true
