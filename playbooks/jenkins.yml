# https://www.jenkins.io/doc/book/glossary
# https://www.jenkins.io/doc/book/managing
# https://www.jenkins.io/doc/book/managing/nodes
# https://www.jenkins.io/doc/book/using/best-practices
# https://www.jenkins.io/doc/book/pipeline/shared-libraries
# https://www.jenkins.io/doc/pipeline/steps
---
- name: Install Jenkins CI/CD stack
  tags: install
  hosts: "{{ rke_control_plane_host }}"
  vars_files:
    - vars/kubernetes.yml
    - vars/monitoring.yml
    - vars/storage.yml
    - vars/harbor.yml
    - vars/gitea.yml
    - vars/gitlab.yml
    - vars/jenkins.configure.yml
    - vars/jenkins.yml
  vars:
    # required kubernetes>=24.2 package only in user virtualenv
    ansible_python_interpreter: "{{ venv_python_interpreter }}"
    kubeconfig: "{{ rke_kubeconfig }}"
    secret_ns: "{{ jenkins_namespace }}"
    create_ns: false
  pre_tasks:
    - name: Get CA certificates from PKI
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
      ansible.builtin.include_tasks: "{{ tasks_dir }}/pki/cacerts.yml"
      when: ca_certificates is undefined

    - name: Get SSH known host identities
      vars:
        ssh_hosts:
          - host: github.com
            port: 22
            fact: github_known_hosts
          - host: "{{ gitea_fqdns[0] }}"
            port: "{{ gitea_ssh_port }}"
            fact: gitea_known_hosts
          - host: "{{ gitlab_fqdns['gitlab'] }}"
            port: "{{ gitlab_shell_port }}"
            fact: gitlab_known_hosts

        # === Inputs ===
        ssh_host: "{{  item.host }}"
        ssh_port: "{{  item.port }}"
        fact_name: "{{ item.fact }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/hosts/knownhosts.yml"
      loop: "{{ ssh_hosts }}"
      loop_control:
        label: "{{ item.host }}:{{ item.port }}"

    - name: Update SSH known_hosts facts
      vars:
        # since we're using non-standard SSH ports,
        # first field of each line is `[host]:port`
        svc_hosts:
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/regex_replace_filter.html
          gitea: "{{   gitea_known_hosts | map('regex_replace', '^[^:]+', '['~    gitea_ssh_host ~']') }}"
          gitlab: "{{ gitlab_known_hosts | map('regex_replace', '^[^:]+', '['~ gitlab_shell_host ~']') }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        # contains known_hosts entries for external and in-cluster FQDNs
        gitea_known_hosts: "{{   gitea_known_hosts + svc_hosts.gitea  }}"
        gitlab_known_hosts: "{{ gitlab_known_hosts + svc_hosts.gitlab }}"
        jenkins_jobs: []

    - name: Get tokens from Gitea secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitea/tokens.yml"
      # sets fact: gitea_tokens

    - name: Get PATs from GitLab secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitlab/tokens/pats.yml"
      # sets fact: gitlab_pats
  tasks:
    # IMPORTANT: after pushing a new version of the shared library that uses
    # the same image tag (e.g. "latest"), make sure to purge "workspace@libs"
    # directories for each job that should use the new version--Jenkins does
    # not pull the same library version again once pipeline has been created!
    - name: Push shared library to Harbor
      vars:
        dir_path: "{{ files_dir }}/jenkins/sharedlib"
        image_ref: jenkins-sharedlib:latest
        # required artifact type: https://plugins.jenkins.io/pipeline-lib-oras
        artifact_type: application/vnd.jenkins.lib.manifest.v1+json
        # https://specs.opencontainers.org/image-spec/annotations
        annotations:
          # "org.opencontainers.image" will be
          # prepended to keys if begin with '.'
          .title: jenkins-sharedlib
          .description: Jenkins shared library of CI/CD utilities and Bash functions
        harbor_user: "{{ jenkins_harbor_user }}"
        harbor_pass: "{{ jenkins_harbor_pass }}"
        if_changed: Delete shared library dirs
      ansible.builtin.include_tasks: "{{ tasks_dir }}/oci/oras.push.yml"

    - name: Create Jenkins ingress secret
      vars:
        secret_name: "{{ jenkins_secrets['ingress'] }}"
        create_ns: true
        cert_name: jenkins-ingress
        sans: "{{ [jenkins_fqdn] }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/tls.step.yml"

    - name: Create Jenkins envFrom secret
      vars:
        ca_prefix: "{{ homelab_domain.split('.')[0] }}_"
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/unvault_lookup.html
        ssh_key: "{{ lookup('ansible.builtin.unvault', files_dir ~ '/erhhung/id_ed25519_auth') }}"

        # === Inputs ===
        secret_name: "{{ jenkins_secrets['env-vars'] }}"
        secret_data: "{{ {
          ca_prefix ~'intermediate_ca.crt': ca_certificates[0],
          ca_prefix ~'root_ca.crt':         ca_certificates[1],
          'ICLOUD_PASSWORD':  icloud_smtp.passwords['jenkins'],
          'HARBOR_PASSWORD':  jenkins_harbor_pass,
          'ERHHUNG_SSH_KEY':  ssh_key,
          'GITEA_TOKEN':      gitea_tokens['erhhung-repos'],
          'GITHUB_TOKEN':     github_access_token,
          'GITLAB_TOKEN':     gitlab_pats['repos'],
          'SLACK_TOKEN':      jenkins_slack_token,
          } }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    - name: Get Jenkins job-dsl scripts
      vars:
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/fileglob_lookup.html
        # https://docs.ansible.com/ansible/latest/plugins/lookup.html#forcing-lookups-to-return-lists-query-and-wantlist-true
        jobs: "{{ query('ansible.builtin.fileglob', templates_dir ~ '/jenkins/jobs/*.groovy*') }}"
      ansible.builtin.set_fact:
        jenkins_jobs: "{{ jenkins_jobs + [lookup('ansible.builtin.template', item) | trim] }}"
      loop: "{{ jobs }}"
      loop_control:
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/basename_filter.html
        label: "{{ item | ansible.builtin.basename | regex_replace('\\.groovy(\\.j2)?', '') }}"

    - name: Install Jenkins Helm chart
      vars:
        repo_name: jenkins
        repo_url: https://charts.jenkins.io
        chart_ref: jenkins
        chart_ver: "{{ jenkins_chart_version }}"
        release: "{{ jenkins_release_name }}"
        release_ns: "{{ jenkins_namespace }}"
        values: "{{ jenkins_chart_values }}"

        patches:
          merge_patches:
            - apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: "{{ jenkins_release_name }}"
                namespace: "{{ jenkins_namespace }}"
              spec:
                template:
                  spec:
                    containers:
                      - name: jenkins
                        # mount Java keystore and system trust store
                        # updated by the "ca-bundle" init container
                        volumeMounts:
                          - name: jenkins-home
                            mountPath: /opt/java/openjdk/lib/security/cacerts
                            subPath: certs/jssecacerts
                          - name: jenkins-home
                            mountPath: /etc/ssl/certs/ca-certificates.crt
                            subPath: certs/ca-bundle.crt

        extras: # adopt extra resources into Helm release
          - cert-manager.io/v1 Certificate {{ jenkins_secrets['ingress']  }}
          - v1 Secret {{ jenkins_secrets['env-vars'] }}
      ansible.builtin.include_tasks: "{{ tasks_dir }}/helm/helmfile.yml"
  handlers:
    - name: Delete shared library dirs
      vars:
        script: |-
          find  "$JENKINS_HOME/jobs" \
            -path "*/workspace@libs" \
            -type  d -prune \
            -exec rm -rf {} +
      # https://docs.ansible.com/ansible/latest/collections/kubernetes/core/k8s_exec_module.html
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ rke_kubeconfig }}"
        namespace: "{{ jenkins_namespace }}"
        pod: "{{ jenkins_release_name }}-0"
        container: jenkins
        command: bash -c "{{ script | regex_replace('([\\"])', '\\\1') }}"
      changed_when: true

- name: Configure Jenkins dashboards
  tags: dashboards
  hosts: localhost
  vars_files:
    - vars/jenkins.yml
  tasks:
    - name: Import Grafana dashboards
      vars:
        dashboards: "{{ jenkins_grafana_dashboards }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/grafana/dashboards.yml"
