# VS Code thinks "buildkite.yml" is Buildkite configuration,
# so explicitly set schema from https://www.schemastore.org:
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json

# https://buildkite.com/docs/agent/v3
# https://buildkite.com/docs/agent/v3/agent-stack-k8s
# https://buildkite.com/docs/agent/v3/agent-stack-k8s/installation
# https://buildkite.com/docs/platform/emojis
---
- name: Install Buildkite Agent for K8s
  tags: install
  hosts: "{{ rke_control_plane_host }}"
  vars_files:
    - vars/kubernetes.yml
    - vars/gitea.yml
    - vars/gitlab.yml
    - vars/harbor.yml
    - vars/monitoring.yml
    - vars/buildkite.yml
  vars:
    # required kubernetes>=24.2 package only in user virtualenv
    ansible_python_interpreter: "{{ venv_python_interpreter }}"
    kubeconfig: "{{ rke_kubeconfig }}"
    secret_ns: "{{ buildkite_namespace }}"
    create_ns: false
  pre_tasks:
    - name: Get CA certificates from PKI
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
      ansible.builtin.include_tasks: "{{ tasks_dir }}/pki/cacerts.yml"
      when: ca_certificates is undefined

    - name: Get SSH known host identities
      vars:
        ssh_hosts:
          - host: github.com
            port: 22
            fact: github_known_hosts
          - host: "{{ gitea_fqdns[0] }}"
            port: "{{ gitea_ssh_port }}"
            fact: gitea_known_hosts
          - host: "{{ gitlab_fqdns['gitlab'] }}"
            port: "{{ gitlab_shell_port }}"
            fact: gitlab_known_hosts

        # === Inputs ===
        ssh_host: "{{  item.host }}"
        ssh_port: "{{  item.port }}"
        fact_name: "{{ item.fact }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/hosts/knownhosts.yml"
      loop: "{{ ssh_hosts }}"
      loop_control:
        label: "{{ item.host }}:{{ item.port }}"

    - name: Update SSH known_hosts facts
      vars:
        # since we're using non-standard SSH ports,
        # first field of each line is `[host]:port`
        svc_hosts:
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/regex_replace_filter.html
          gitea: "{{   gitea_known_hosts | map('regex_replace', '^[^:]+', '['~    gitea_ssh_host ~']') }}"
          gitlab: "{{ gitlab_known_hosts | map('regex_replace', '^[^:]+', '['~ gitlab_shell_host ~']') }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        # contains known_hosts entries for external and in-cluster FQDNs
        gitea_known_hosts: "{{   gitea_known_hosts + svc_hosts.gitea  }}"
        gitlab_known_hosts: "{{ gitlab_known_hosts + svc_hosts.gitlab }}"

    - name: Get tokens from Gitea secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitea/tokens.yml"
      # sets fact: gitea_tokens

    - name: Get PATs from GitLab secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitlab/tokens/pats.yml"
      # sets fact: gitlab_pats
  tasks:
    - name: Create CA certificates secret
      vars:
        ca_prefix: "{{ homelab_domain.split('.')[0] }}_"

        # === Inputs ===
        create_ns: true
        secret_name: "{{ buildkite_secrets['ca-certs'] }}"
        secret_data: "{{ {
          ca_prefix ~'intermediate_ca.crt': ca_certificates[0],
          ca_prefix ~'root_ca.crt':         ca_certificates[1],
          } }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    - name: Create SSH credentials secret
      vars:
        secret_name: "{{ buildkite_secrets['ssh-creds'] }}"
        secret_data:
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/unvault_lookup.html
          id_ed25519: "{{ lookup('ansible.builtin.unvault', files_dir ~ '/erhhung/id_ed25519_auth') }}"
          known_hosts: |
            {{ github_known_hosts | join(LF) }}
            {{  gitea_known_hosts | join(LF) }}
            {{ gitlab_known_hosts | join(LF) }}
          config: |
            Host *
              StrictHostKeyChecking yes
              IdentitiesOnly        yes
              IdentityFile ~/.ssh/id_ed25519
              User git
            Host {{ gitea_fqdns[0] }} {{ gitea_ssh_host }}
              Port {{ gitea_ssh_port }}
            Host {{ gitlab_fqdns['gitlab'] }} {{ gitlab_shell_host }}
              Port {{ gitlab_shell_port }}
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    # https://git-scm.com/docs/git-credential-store
    - name: Create .git-credentials secret
      vars:
        github_creds: erhhung:{{ github_access_token }}
        gitea_creds: erhhung:{{ gitea_tokens['erhhung-repos'] }}
        gitlab_creds: erhhung:{{ gitlab_pats['repos'] }}

        # === Inputs ===
        secret_name: "{{ buildkite_secrets['git-creds'] }}"
        secret_data:
          # https://git-scm.com/docs/git-credential-store#_storage_format
          .git-credentials: |
            https://{{ github_creds }}@github.com/erhhung/
            https://{{  gitea_creds }}@{{ gitea_fqdns[0] }}
            https://{{  gitea_creds }}@{{ gitea_service_host }}:{{ gitea_service_port }}
            https://{{ gitlab_creds }}@{{ gitlab_fqdns['gitlab'] }}
            https://{{ gitlab_creds }}@{{ gitlab_service_host }}:{{ gitlab_service_port }}
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    # env vars set in command containers
    - name: Create command envFrom secret
      vars:
        ci_reg_path: "{{ harbor_container_registry }}/{{ harbor_default_project }}"

        # === Inputs ===
        secret_name: "{{ buildkite_secrets['env-vars'] }}"
        secret_data:
          # https://www.gnu.org/software/bash/manual/html_node/Bash-Startup-Files.html#Invoked-non_002dinteractively
          BASH_ENV: /ci/scripts/pre-build.sh

          CI_REGISTRY: "{{ harbor_url }}"
          CI_REGISTRY_PATH: "{{ ci_reg_path }}"
          CI_REGISTRY_USER: "{{ buildkite_harbor_user }}"
          CI_REGISTRY_PASSWORD: "{{ buildkite_harbor_pass }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    # CI scripts used by command containers
    - name: Create command scripts ConfigMap
      # https://docs.ansible.com/ansible/latest/collections/kubernetes/core/k8s_module.html
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ buildkite_configmaps['scripts'] }}"
            namespace: "{{ buildkite_namespace }}"
          data:
            ci-utils.sh: "{{ lookup('ansible.builtin.file',
              files_dir ~ '/buildkite/ciutils.sh', rstrip=false) }}"
            # this script will be sourced via `$BASH_ENV` defined
            # in the agent's `container-N`, but unset immediately
            # to prevent repeat execution in subshell environment
            pre-build.sh: |
              unset BASH_ENV
              . /ci/scripts/ci-utils.sh
              sys_info
              env_vars
              identities
              section_end 'End of pre-build script'
        validate:
          fail_on_error: true
        state: present

    - name: Install Buildkite Agent Helm chart
      vars:
        monitoring: "{{ buildkite_chart_values.monitoring }}"
        # deploy extra objects like runner ServiceAccount
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/template_lookup.html
        extra_objs: "{{ lookup('ansible.builtin.template',
          templates_dir ~ '/buildkite/extras.yaml.j2') }}"

        # === Inputs ===
        tmpdir_name: buildkite
        chart_ref: "{{ buildkite_chart_oci_url }}"
        chart_ver: "{{ buildkite_chart_version }}"
        release: "{{ buildkite_release_name }}"
        release_ns: "{{ buildkite_namespace }}"
        values: "{{ buildkite_chart_values }}"

        patches:
          json_patches:
            # the Helm chart is lacking common
            # settings to customize PodMonitor
            - |
              {% if monitoring.podMonitor.deploy %}
              target:
                group: monitoring.coreos.com
                version: v1
                kind: PodMonitor
                name: {{ buildkite_release_name }}-podmonitor
                namespace: {{ buildkite_namespace }}
              patch:
                - op: replace
                  path: /metadata/name
                  value: {{ buildkite_release_name }}
                - op: add
                  path: /metadata/labels/release
                  value: {{ monitoring_release_name }}
              ---
              {% endif %}
              {% if monitoring.deployGrafanaDashboard %}
              target:
                version: v1
                kind: ConfigMap
                name: {{ buildkite_release_name }}-grafana-dashboard
                namespace: {{ buildkite_namespace }}
              patch:
                - op: replace
                  path: /metadata/name
                  value: {{ buildkite_release_name }}-dashboard
              {% endif %}

        extras: # adopt extra resources into Helm release
          - v1 Secret    {{ buildkite_secrets['ca-certs']   }}
          - v1 Secret    {{ buildkite_secrets['ssh-creds']  }}
          - v1 Secret    {{ buildkite_secrets['git-creds']  }}
          - v1 Secret    {{ buildkite_secrets['env-vars']   }}
          - v1 ConfigMap {{ buildkite_configmaps['scripts'] }}
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/from_yaml_all_filter.html
          - "{{ extra_objs | from_yaml_all }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/helm/helmfile.yml"

- name: Create/update Buildkite pipelines
  tags: pipelines
  hosts: localhost
  vars_files:
    - vars/buildkite.yml
  vars:
    ansible_python_interpreter: "{{ default_python_interpreter }}"
  tasks:
    - name: Create/update Buildkite pipeline
      vars:
        pipeline_name: "{{  item.name }}"
        pipeline_slug: "{{  item.slug | default(none) }}"
        repository_url: "{{ item.repo_url }}"
        default_branch: "{{ item.default_branch | default(none) }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/buildkite/pipeline.yml"
      loop: "{{ buildkite_pipelines }}"
      loop_control:
        label: "{{ item.name }}"
