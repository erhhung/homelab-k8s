# https://kyverno.io/docs/introduction/how-kyverno-works
# https://kyverno.io/docs/installation/installation#helm-chart
# reports CRs API group: openreports.io
---
- name: Install Kyverno policy engine
  tags: install
  hosts: &hosts
    - "{{ k3s_control_plane_host }}"
    - "{{ rke_control_plane_host }}"
  vars_files:
    - vars/kubernetes.yml
    - vars/monitoring.yml
    - vars/kyverno.yml
  vars: &vars
    # required kubernetes>=24.2 package only in user virtualenv
    ansible_python_interpreter: "{{ venv_python_interpreter }}"
    # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/ternary_filter.html
    cluster: "{{ (inventory_hostname in groups['k3s_cluster']) | ternary('k3s','rke') }}"
    kubeconfig: "{{ vars[cluster ~'_kubeconfig'] }}"
  pre_tasks:
    - name: Is the monitoring stack ready?
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
      ansible.builtin.include_tasks: "{{ tasks_dir }}/monitoring/stackready.yml"
      when: prometheus_crds_installed is undefined
  tasks:
    - name: Install Kyverno Helm chart
      vars:
        kyverno_svc_tls: "{{ kyverno_namespace }}.svc.kyverno-tls"

        # === Inputs ===
        repo_name: kyverno
        repo_url: https://kyverno.github.io/kyverno
        chart_ref: kyverno
        chart_ver: "{{ kyverno_chart_version }}"
        release: "{{ kyverno_release_name }}"
        release_ns: "{{ kyverno_namespace }}"
        values: "{{ kyverno_chart_values }}"

        extras: # adopt extra resources into Helm release
          - v1 Secret                kyverno-svc.{{ kyverno_svc_tls }}-pair ? # created on startup
          - v1 Secret                kyverno-svc.{{ kyverno_svc_tls }}-ca   ? # created on startup
          - v1 Secret kyverno-cleanup-controller.{{ kyverno_svc_tls }}-pair ? # created on startup
          - v1 Secret kyverno-cleanup-controller.{{ kyverno_svc_tls }}-ca   ? # created on startup
      ansible.builtin.include_tasks: "{{ tasks_dir }}/helm/helmfile.yml"

- name: Create Kyverno policy objects
  tags: policies
  hosts: *hosts
  vars_files:
    - vars/kubernetes.yml
    - vars/kyverno.yml
    - vars/trivy.yml
  vars: *vars
  pre_tasks:
    - name: Load Kyverno policy manifests
      vars:
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/fileglob_lookup.html
        files: |
          {% set files = [] %}
          {% for dest in ['all', cluster] %}
          {%   set dir = templates_dir ~'/kyverno/policies/'~ dest %}
          {%   if  dir is directory %}
          {%     set _ = files.extend(query('ansible.builtin.fileglob',
                          dir ~'/*.yaml*') | reject('search', '/\.[^/]+$')
                                           | ansible.builtin.sort) %}
          {%   endif %}
          {% endfor  %}
          {{ files   }}
        # each YAML file can define multiple policy objects, but
        # filter out empty ones if template conditionals exclude
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/template_lookup.html
        # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/from_yaml_all_filter.html
        policies: |
          {{ lookup('ansible.builtin.template', item)  | from_yaml_all |
                                 selectattr('metadata.name',  'defined') }}
        label: "{{ policies | map(attribute='metadata.name') | join(',') }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        kyverno_policies: "{{ kyverno_policies | default([]) + policies }}"
      loop: "{{ files }}"
      loop_control:
        label: "{{ label or item | basename | regex_replace('^(.+?)\\.yaml.*$', '\\1') }}"
  tasks:
    - name: Create Kyverno policy resource
      # https://docs.ansible.com/ansible/latest/collections/kubernetes/core/k8s_module.html
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        namespace: "{{ kyverno_namespace }}"
        definition: "{{ item }}"
        state: present
        apply: true
        wait: true
      loop: "{{ kyverno_policies }}"
      loop_control:
        label: "{{ item.metadata.name }}"
