# https://code.visualstudio.com/docs/remote/ssh
# https://opencode.ai/docs
---
- name: Build dev container OCI image
  tags: build
  hosts: localhost
  vars_files:
    - vars/opencode.yml
  tasks:
    - name: Build image and push to Harbor
      vars:
        image_name: "{{  opencode_dev_container.image }}"
        build_args:
          DEV_USER: "{{  opencode_dev_container.dev_user  }}"
          DEV_UID: "{{   opencode_dev_container.dev_uid   }}"
          DEV_GROUP: "{{ opencode_dev_container.dev_group }}"
          DEV_GID: "{{   opencode_dev_container.dev_gid   }}"
          SSH_PORT: "{{  opencode_dev_container.ssh_port  }}"
        context_dir: "{{ files_dir }}/opencode/devcontainer"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
      ansible.builtin.include_tasks: "{{ tasks_dir }}/oci/build.yml"

- name: Deploy OpenCode dev container
  tags: install
  hosts: "{{ rke_control_plane_host }}"
  vars_files:
    - vars/kubernetes.yml
    - vars/storage.yml
    - vars/litellm.yml
    - vars/minio.yml
    - vars/gitea.yml
    - vars/gitlab.yml
    - vars/opencode.yml
  vars:
    # required kubernetes>=24.2 package only in user virtualenv
    ansible_python_interpreter: "{{ venv_python_interpreter }}"
    kubeconfig: "{{ rke_kubeconfig }}"
    secret_ns: "{{ opencode_namespace }}"
    home_dir: /home/{{ opencode_dev_container.dev_user }}
  pre_tasks:
    - name: Get CA certificates from PKI
      ansible.builtin.include_tasks: "{{ tasks_dir }}/pki/cacerts.yml"
      when: ca_certificates is undefined

    - name: Get dev user LiteLLM API key
      vars:
        secret_key: "{{ opencode_dev_container.dev_user }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/litellm/apikey.yml"
      # sets fact: litellm_api_key

    - name: Get tokens from Gitea secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitea/tokens.yml"
      # sets fact: gitea_tokens

    - name: Get PATs from GitLab secret
      ansible.builtin.include_tasks: "{{ tasks_dir }}/gitlab/tokens/pats.yml"
      # sets fact: gitlab_pats

    - name: Get vCluster kubeconfig data
      ansible.builtin.include_tasks: "{{ tasks_dir }}/vcluster/kubeconfig.yml"
      # sets fact: vcluster_kubeconfig

    - name: Read Erhhung's GnuPG keyring
      delegate_to: localhost
      vars:
        age_file: "{{ files_dir }}/erhhung/gnupg.tar.gz.age"
        # use the default Python interpreter on Ansible controller
        ansible_python_interpreter: "{{ default_python_interpreter }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/shell_module.html
      ansible.builtin.shell: |
        age_file="{{ age_file }}"
        tmp_file="/tmp/$(basename "$age_file")"
        tar_file="${tmp_file%.gz.age}"

        cp -f "$age_file"            "$tmp_file"
        "{{ scripts_dir }}/gzage.sh" "$tmp_file"
        base64 -i "$tar_file" -w0
        rm     -f "$tar_file"
      args:
        executable: "{{ local_bash_interpreter }}"
      register: gnupg_tar_b64
      changed_when: false
  tasks:
    - name: Create OpenCode secrets secret
      vars:
        ssh_keys: |
          {% set keys = {} %}
          {% for file in ['erhhung.pem', 'id_ed25519_auth'] %}
          {#   https://docs.ansible.com/ansible/latest/collections/ansible/builtin/unvault_lookup.html #}
          {%   set _ = keys.update({file: lookup('ansible.builtin.unvault', files_dir ~'/erhhung/'~ file)}) %}
          {% endfor %}
          {{ keys   }}
        # https://git-scm.com/docs/git-credential-store
        gitea_creds: erhhung:{{ gitea_tokens['erhhung-repos'] }}
        gitlab_creds: erhhung:{{ gitlab_pats['repos'] }}
        github_creds: erhhung:{{ github_access_token  }}

        # === Inputs ===
        secret_name: "{{ opencode_secrets['secrets'] }}"
        secret_data:
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/template_lookup.html
          ssh_config: "{{ lookup('ansible.builtin.template', templates_dir ~ '/opencode/ssh_config.j2') }}"

          erhhung.pem: "{{     ssh_keys['erhhung.pem']     }}"
          id_ed25519_auth: "{{ ssh_keys['id_ed25519_auth'] }}"
          gnupg.tar: "{{ gnupg_tar_b64.stdout | b64decode  }}"

          # https://git-scm.com/docs/git-credential-store#_storage_format
          .git-credentials: |
            https://{{  gitea_creds }}@{{ gitea_fqdns | first }}
            https://{{ gitlab_creds }}@{{ gitlab_fqdns['gitlab'] }}
            https://{{ github_creds }}@github.com/erhhung/

          aws_config: "{{      lookup('ansible.builtin.template', templates_dir ~ '/aws/config.j2')      }}"
          aws_credentials: "{{ lookup('ansible.builtin.template', templates_dir ~ '/aws/credentials.j2') }}"

          AGE_SECRET_KEY: "{{   age_secret_key }}"
          LITELLM_API_KEY: "{{ litellm_api_key }}"
          GITHUB_ACCESS_TOKEN: "{{ github_access_token }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"

    # provide dev container access
    # to sandboxed vClusters only!
    - name: Create dev container kubeconfig
      vars:
        secret_name: "{{ opencode_secrets['kubeconfig'] }}"
        secret_data:
          # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/to_nice_yaml_filter.html
          config: "{{ vcluster_kubeconfig | ansible.builtin.to_nice_yaml(indent=2, sort_keys=false) }}"
      ansible.builtin.include_tasks: "{{ tasks_dir }}/k8s/secrets/generic.yml"
      when: vcluster_kubeconfig is truthy

    - name: Create dev container ConfigMap
      vars:
        public_key: "{{ lookup('ansible.builtin.file',
          files_dir ~ '/erhhung/id_ed25519_auth.pub') }}"
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        namespace: "{{ opencode_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ item.name }}"
          data: "{{   item.data }}"
        validate:
          fail_on_error: true
        state: present
      loop:
        - name: "{{ opencode_configmaps['ca-certs'] }}"
          data:
            # cacerts.pem contains intermediate & root CA certs
            cacerts.pem: "{{ ca_certificates | join(LF) }}"
        - name: "{{ opencode_configmaps['ssh-keys'] }}"
          data: "{{ {
            opencode_dev_container.dev_user ~'.pub': public_key,
            } }}"
        - name: "{{ opencode_configmaps['config'] }}"
          data:
            opencode.json: |
              {% set config = {
                   '$schema': 'https://opencode.ai/config.json',
                 }      | ansible.builtin.combine(opencode_config) %}
              {{ config | ansible.builtin.to_nice_json(indent=2)   }}
      loop_control:
        label: "{{ item.name }}"

    - name: Install dev container Helm chart
      vars:
        repo_name: bjw-s
        repo_url: "{{ opencode_chart_repo_url }}"
        chart_ref: app-template
        chart_ver: "{{ opencode_chart_version }}"
        release: "{{ opencode_release_name }}"
        release_ns: "{{ opencode_namespace }}"
        values: "{{ opencode_chart_values }}"

        extras: # adopt extra resources into Helm release
          - v1 Secret {{ opencode_secrets['secrets'] }}
          - |
            {% if vcluster_kubeconfig is truthy %}
            v1 Secret {{ opencode_secrets['kubeconfig'] }}
            {% endif %}
          - v1 ConfigMap {{ opencode_configmaps['ca-certs'] }}
          - v1 ConfigMap {{ opencode_configmaps['ssh-keys'] }}
          - v1 ConfigMap {{ opencode_configmaps['config']   }}
      ansible.builtin.include_tasks: "{{ tasks_dir }}/helm/helmfile.yml"
