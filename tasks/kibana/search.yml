# create saved search in OpenSearch Dashboards:
# https://opensearch-project.github.io/OpenSearch-Dashboards/docs/openapi/saved_objects
#
# pass the following vars:
#   title       <required> saved search title
#   description [optional] search description
#   fields      <required> selected fields
#   patterns    <required> index patterns
# requires vars from:
#   vars/opensearch.yml
#   vars/kibana.yml
#   vars/logging.yml
# sets the following facts:
#   saved_search_id
#   saved_explore_id (in workspace mode)
---
- name: Gather facts about controller
  # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
  ansible.builtin.include_tasks: "{{ tasks_dir }}/localfacts.yml"
  when: local_python_interpreter is undefined

- name: Create saved search
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: "{{ local_python_interpreter }}"
    saved_objs_url: "{{ kibana_api_url }}/saved_objects"

    uri_params: &uri-params
      url_username: admin
      url_password: "{{ opensearch_admin_pass }}"
      force_basic_auth: true
      return_content: true
    post_params: &post-params
      method: POST
      headers:
        osd-xsrf: "true"
      body_format: json

    _patterns: "{{ [patterns] | flatten }}"
    pat_ref_name: kibanaSavedObjectMeta.searchSourceJSON.index
    workspaces: "{{ [osd_workspace_id] if osd_workspace_id is defined else omit }}"
  block:
    - name: Get index patterns
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/uri_module.html
      ansible.builtin.uri:
        <<: *uri-params
        # get `title` and `timeFieldName` attribute fields only
        url: "{{ saved_objs_url }}/_find?type=index-pattern&fields=title&fields=timeFieldName&per_page=1000"
      register: index_patterns
      retries: 5
      delay: 2

    - name: Define pattern_attrs
      vars:
        saved_objs: "{{ index_patterns.json.saved_objects }}"
        pat_title: "{{ _patterns | first }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        pattern_attrs: |
          {% set attrs = {} %}
          {% set obj   = saved_objs | selectattr('attributes.title', '==', pat_title) %}
          {% if  obj  is truthy %}
          {%   set _ = attrs.update({
                 'id':            obj[0].id,
                 'type':         'INDEX_PATTERN',
                 'title':         pat_title,
                 'timeFieldName': obj[0].attributes.timeFieldName,
               })  %}
          {% endif %}
          {{ attrs }}

    - name: Define pattern_refs
      ansible.builtin.set_fact:
        pattern_refs:
          - id: "{{ pattern_attrs.id }}"
            name: "{{ pat_ref_name }}"
            type: index-pattern

    - name: Get saved searches
      ansible.builtin.uri:
        <<: *uri-params
        # specify multiple `type` values to match both types `search` and `explore`
        url: "{{ saved_objs_url }}/_find?type=search&type=explore&fields=title&per_page=1000"
      register: saved_searches
      retries: 5
      delay: 2

    - name: Find existing search
      vars:
        saved_objs: "{{ saved_searches.json.saved_objects }}"
        existing: "{{ saved_objs | selectattr('attributes.title', '==', title) }}"
        search: "{{  existing | selectattr('type', '==', 'search')  }}"
        explore: "{{ existing | selectattr('type', '==', 'explore') }}"
      ansible.builtin.set_fact:
        _search_id: "{{  search[0].id  if search  is truthy else '' }}"
        _explore_id: "{{ explore[0].id if explore is truthy else '' }}"

    - name: Get existing search
      ansible.builtin.uri:
        <<: *uri-params
        url: "{{ saved_objs_url }}/search/{{ _search_id }}"
      register: saved_search
      when: _search_id is truthy
      retries: 5
      delay: 2

    - name: Create saved search
      ansible.builtin.uri:
        <<: [*uri-params, *post-params]
        url: "{{ saved_objs_url }}/search/{{ _search_id }}?overwrite=true"
        body:
          attributes:
            title: "{{ title }}"
            description: "{{ description | default(omit) }}"
            columns: "{{ fields }}"
          references: "{{ pattern_refs }}"
          workspaces: "{{ workspaces }}"
      register: save_search
      when: _search_id is falsy
      changed_when: true
      retries: 5
      delay: 2

    - name: Create saved explore
      vars:
        ui_state:
          activeTab: logs
        search_src:
          indexRefName: "{{ pat_ref_name }}"
          query:
            language: PPL
            # sort directly in the query due to bug
            # in the saved explore `sort[]` setting
            query: >-
              source = `{{ pattern_attrs.title }}`
              | sort - @timestamp
            dataset: "{{ pattern_attrs }}"
          filter: []
      ansible.builtin.uri:
        <<: [*uri-params, *post-params]
        url: "{{ saved_objs_url }}/explore/{{ _explore_id }}?overwrite=true"
        body:
          # these were largely reverse-engineered
          # from saving an "explore" search in UI
          attributes:
            type: logs
            version: 1
            title: "{{ title }}"
            description: "{{ description | default(omit) }}"
            columns: "{{ fields }}"
            sort:
              # descending sort does NOT currently work:
              # https://github.com/opensearch-project/OpenSearch-Dashboards/issues/11299
              - "{{ [pattern_attrs.timeFieldName, 'desc'] }}"
            uiState: "{{ ui_state | to_json }}"
            kibanaSavedObjectMeta:
              searchSourceJSON: "{{ search_src | to_json }}"
          references: "{{ pattern_refs }}"
          workspaces: "{{ workspaces }}"
      register: save_explore
      when:
        - save_search.json is defined
        - dashboards_workspace_enabled
        - dashboards_explore_enabled
      changed_when: true
      retries: 5
      delay: 2

    - name: Set saved_search_id
      ansible.builtin.set_fact:
        saved_search_id: "{{ _search_id or save_search.json.id }}"

    - name: Set saved_explore_id
      ansible.builtin.set_fact:
        saved_explore_id: "{{ _explore_id or save_explore.json.id }}"
      when:
        - dashboards_workspace_enabled
        - dashboards_explore_enabled
