# get a resource's `metadata.ownerReferences`
#
# pass the following vars:
#   kubeconfig  <required> path to kubeconfig
#   api_version <required> resource apiVersion
#   res_kind    <required> resource kind
#   res_name    <required> resource name
#   res_ns      <required> resource namespace
#   max_wait    [optional] default=10 (seconds)
#   fact_name   <required> fact to store owners
# sets the following facts:
#   {fact_name} list of ownerReferences objects
---
- name: Get resource metadata.ownerReferences
  vars:
    # required kubernetes>=24.2 package only in user virtualenv
    ansible_python_interpreter: "{{ venv_python_interpreter }}"
  block:
    - name: Get {{ res_name }} {{ res_kind }}
      # https://docs.ansible.com/ansible/latest/collections/kubernetes/core/k8s_info_module.html
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: "{{ api_version }}"
        kind: "{{ res_kind }}"
        name: "{{ res_name }}"
        namespace: "{{ res_ns }}"
      # https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_loops.html#retrying-a-task-until-a-condition-is-met
      register: res_info
      retries: 10
      delay: "{{ max_wait | default(10) / 10 }}"
      until: res_info.resources is truthy

    - name: Set {{ fact_name }} fact
      vars:
        metadata: "{{ res_info.resources[0].metadata | default({}) }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        "{{ fact_name }}": "{{ metadata.ownerReferences | default([]) }}"
