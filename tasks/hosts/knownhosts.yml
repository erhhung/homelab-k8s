# get SSH known_hosts entries for host
#
# pass the following vars:
#   ssh_host  <required> name or IP
#   ssh_port  [optional] default=22
#   key_types [optional] default=[ecdsa,ed25519,rsa]
#   fact_name [optional] fact to store host entries
#                        default=known_hosts
# sets the following facts:
#   {fact_name}  list of known_hosts entries
#                ordered by given key types
---
- name: Gather facts about controller
  # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/include_tasks_module.html
  ansible.builtin.include_tasks: "{{ tasks_dir }}/localfacts.yml"
  when: local_python_interpreter is undefined

- name: Get SSH known_hosts entries
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: "{{ local_python_interpreter }}"
    hosts_fact: "{{ fact_name | default('known_hosts') }}"
  block:
    - name: Get ssh-keyscan output
      vars:
        ssh_port_: "{{ ssh_port | default(22) }}"
        # man ssh-keyscan
        default_types:
          - ecdsa
          - ed25519
          - rsa
        types: "{{ [key_types | default(default_types)] | flatten }}"
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/shell_module.html
      ansible.builtin.shell: |
        set -eo pipefail

        for type in {{ types | join(' ') }}; do
          ssh-keyscan -t $type -p {{ ssh_port_ }} {{ ssh_host }} 2> /dev/null | egrep -v '^#'
        done
      args:
        executable: "{{ local_bash_interpreter }}"
      register: ssh_keyscan
      changed_when: false

    - name: Set {{ hosts_fact }} fact
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/set_fact_module.html
      ansible.builtin.set_fact:
        "{{ hosts_fact }}": "{{ ssh_keyscan.stdout_lines }}"
